name: Ping My Movie Siteson:  schedule:    - cron: '*/50 * * * *'  workflow_dispatch:permissions:  contents: write  # ← 新增：允许推送 commitjobs:  ping:    runs-on: ubuntu-latest    steps:      - name: Checkout repository  # ← 新增：拉取仓库        uses: actions/checkout@v4      - name: Check Sites Availability        run: |          check_site() {            local url=$1            local name=$2            local max_retries=3            local count=0            local success=false            echo "正在检查: $name ($url) ..."            while [ $count -lt $max_retries ]; do              count=$((count + 1))                            response=$(curl -L -s -w "%{http_code}" \                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \                -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \                -H "Accept-Language: zh-CN,zh;q=0.9,en;q=0.8" \                --compressed \                --connect-timeout 20 \                --max-time 40 \                "$url")              status_code="${response: -3}"              if [[ $status_code =~ ^[23][0-9]{2}$ ]]; then                echo "? $name 访问成功 | 状态码: $status_code"                success=true                break              else                echo "?? $name 第 $count 次尝试失败 | 状态码: $status_code | 重试中..."                sleep 5              fi            done            if [ "$success" = false ]; then              echo "? $name 连续 $max_retries 次访问失败！"              return 1            fi          }          failed_count=0                    check_site "https://mozila.eu.org" "Cloudflare Pages影视站" || failed_count=$((failed_count + 1))          if [ $failed_count -gt 0 ]; then            echo "?? 检测到 $failed_count 个站点访问异常，请检查！"            exit 1          fi        timeout-minutes: 10      - name: Keep repository active  # ← 新增：防止 workflow 被自动禁用        run: |          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"          git config user.name "github-actions[bot]"          git commit --allow-empty -m "chore: keep alive [skip ci]"          git push
