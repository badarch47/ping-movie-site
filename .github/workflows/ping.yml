name: Ping My Movie Sites
on:
  schedule:
    # 每 50 分钟执行一次（建议改为 30 分钟更稳妥，防止部分平台 1 小时回收资源）
    - cron: '*/50 * * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check Sites Availability
        run: |
          # 定义监控函数
          check_site() {
            local url=$1
            local name=$2
            local max_retries=3
            local count=0
            local success=false

            echo "🔍 正在检查: $name ($url) ..."

            while [ $count -lt $max_retries ]; do
              count=$((count + 1))
              
              # 使用 curl 获取响应，同时捕获状态码和内容快照
              # --compressed 处理 gzip/br 压缩
              # -L 跟随重定向
              response=$(curl -L -s -w "%{http_code}" \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
                -H "Accept-Language: zh-CN,zh;q=0.9,en;q=0.8" \
                --compressed \
                --connect-timeout 20 \
                --max-time 40 \
                "$url")

              # 提取状态码（最后三位）
              status_code="${response: -3}"
              # 提取网页内容前缀（用于判断是否被拦截或为空）
              content_preview="${response:0:100}"

              if [[ $status_code =~ ^[23][0-9]{2}$ ]]; then
                echo "✅ $name 访问成功 | 状态码: $status_code"
                success=true
                break
              else
                echo "⚠️ $name 第 $count 次尝试失败 | 状态码: $status_code | 重试中..."
                sleep 5
              fi
            done

            if [ "$success" = false ]; then
              echo "❌ $name 连续 $max_retries 次访问失败！"
              return 1
            fi
          }

          # --- 配置区：在此添加或修改你的网址 ---
          # 格式: check_site "网址" "备注名称"
          
          # 记录失败次数
          failed_count=0
          
          check_site "https://mozila.eu.org" "Cloudflare Pages影视站" || failed_count=$((failed_count + 1))

          # 如果有任何一个站点失败，则以错误状态退出，触发 GitHub 邮件提醒
          if [ $failed_count -gt 0 ]; then
            echo "🚨 检测到 $failed_count 个站点访问异常，请检查！"
            exit 1
          fi

        timeout-minutes: 10
